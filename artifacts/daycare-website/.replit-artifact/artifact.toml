kind = "web"
previewPath = "/"
title = "Bright Horizons Day Care"
version = "1.0.0"
id = "artifacts/daycare-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21988
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/daycare-website run dev"

[services.env]
PORT = "21988"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/daycare-website", "run", "build"]
publicDir = "artifacts/daycare-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
